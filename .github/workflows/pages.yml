name: deploy site to github pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow only one concurrent deployment, skip queued runs but let in-progress finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup pages
        uses: actions/configure-pages@v5

      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # publish the entire repo root — index.html, assets/, robots.txt,
          # llms.txt, sitemap.xml, CNAME, manifest, etc.
          path: '.'

      - name: deploy
        id: deployment
        uses: actions/deploy-pages@v4
