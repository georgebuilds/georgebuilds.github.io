<svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ears -->
  <circle cx="18" cy="18" r="7" stroke="#F4A261" stroke-width="1.5" opacity="0.8"/>
  <circle cx="38" cy="18" r="7" stroke="#F4A261" stroke-width="1.5" opacity="0.8"/>
  <!-- inner ear fill -->
  <circle cx="18" cy="18" r="3.5" fill="#F4A261" opacity="0.2"/>
  <circle cx="38" cy="18" r="3.5" fill="#F4A261" opacity="0.2"/>
  <!-- head -->
  <circle cx="28" cy="31" r="14" stroke="#F4A261" stroke-width="1.5"/>
  <!-- eyes: >.< style from the ascii mascot -->
  <path d="M20 29.5l3 1.5-3 1.5" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M36 29.5l-3 1.5 3 1.5" stroke="#F4A261" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- nose -->
  <circle cx="28" cy="34" r="1.5" fill="#F4A261"/>
  <!-- whiskers -->
  <line x1="9"  y1="32.5" x2="21" y2="31.5" stroke="#F4A261" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="9"  y1="35.5" x2="21" y2="35"   stroke="#F4A261" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="47" y1="32.5" x2="35" y2="31.5" stroke="#F4A261" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  <line x1="47" y1="35.5" x2="35" y2="35"   stroke="#F4A261" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
</svg>
